  ["Jewelry","💍","luxury"],["Toys","🧸","fun"],["Books","📚","fun"],

  ["Gaming","🎮","gadget"],["Beauty","💄","clothing"],["Outdoor","🏕️","fun"],
];
function buildStores(){
  const out=[]; let id=0;
  for(let i=0;i<150;i++){
    const base=STORE_BASES[i%STORE_BASES.length];
    const t=STORE_TYPES[(i*7+ (i%STORE_TYPES.length))%STORE_TYPES.length];
    const tierMul = 1 + ((id*13)%5)*0.6;
    const price = Math.round((20 + (id*17)%180) * tierMul);
    out.push({ id:id++, name:`${base} ${t[0]}`, emoji:t[1], cat:t[2],
      itemName:`${base} ${t[0]} item`, price, xp: 3 + (id%5) });
  }
  return out;
}

/* ============================================================================
   3D WORLD  (vanilla Three.js, controlled via a class, bridged to React)
   ========================================================================== */
class World {
  constructor(mount, hooks){
    this.mount=mount; this.hooks=hooks; // hooks: onNear(buildingId|null), onDeliveryDone()
    this.keys={}; this.inVehicle=false; this.delivery=null;
    this.buildings=[]; this.enabled=true;
    this.controlsLocked=false;
    this._init();
  }
  _init(){
    const W=this.mount.clientWidth, H=this.mount.clientHeight;
    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0x87b8e8);
    scene.fog=new THREE.Fog(0x87b8e8, 80, 320);
    this.scene=scene;
    const cam=new THREE.PerspectiveCamera(70, W/H, 0.1, 1000);
    cam.position.set(0,1.7,8); this.cam=cam;
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(W,H); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.shadowMap.enabled=true;
    this.renderer=renderer; this.mount.appendChild(renderer.domElement);

    // lights
    const amb=new THREE.AmbientLight(0xffffff,0.6); scene.add(amb);
    const sun=new THREE.DirectionalLight(0xffffff,0.9); sun.position.set(40,80,20);
    sun.castShadow=true; sun.shadow.mapSize.set(1024,1024);
    sun.shadow.camera.left=-150; sun.shadow.camera.right=150;
    sun.shadow.camera.top=150; sun.shadow.camera.bottom=-150;
    scene.add(sun); this.sun=sun; this.amb=amb;

    // ground
    const ground=new THREE.Mesh(new THREE.PlaneGeometry(600,600),
      new THREE.MeshLambertMaterial({color:0x5fa55a}));
    ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

    // roads (cross)
    const roadMat=new THREE.MeshLambertMaterial({color:0x37383c});
    const r1=new THREE.Mesh(new THREE.PlaneGeometry(12,600),roadMat); r1.rotation.x=-Math.PI/2; r1.position.y=0.02; scene.add(r1);
    const r2=new THREE.Mesh(new THREE.PlaneGeometry(600,12),roadMat); r2.rotation.x=-Math.PI/2; r2.position.y=0.02; scene.add(r2);

    // buildings
    const defs=[
      {id:"home",  name:"🏠 Home",        pos:[-40,-30], color:0xc97f5a, size:[14,10,14]},
      {id:"jobs",  name:"💼 Job Center",   pos:[40,-30],  color:0x3f72af, size:[18,16,16]},
      {id:"mall",  name:"🛍️ Mall",         pos:[-50,40],  color:0xb06fb0, size:[26,12,22]},
      {id:"cars",  name:"🚗 Car Dealer",   pos:[50,40],   color:0xe0524a, size:[18,8,16]},
      {id:"rvs",   name:"🚐 RV Dealer",    pos:[55,-5],   color:0xd6a93a, size:[16,9,16]},
      {id:"bank",  name:"🏦 Bank & Houses",pos:[-55,-5],  color:0x6ec6a0, size:[16,11,16]},
    ];
    const loader=new THREE.TextureLoader();
    defs.forEach(d=>{
      const g=new THREE.BoxGeometry(...d.size);
      const m=new THREE.MeshLambertMaterial({color:d.color});
      const mesh=new THREE.Mesh(g,m);
      mesh.position.set(d.pos[0], d.size[1]/2, d.pos[1]);
      mesh.castShadow=true; mesh.receiveShadow=true; scene.add(mesh);
      // roof marker
      const sign=this._makeLabel(d.name);
      sign.position.set(d.pos[0], d.size[1]+5, d.pos[1]);
      scene.add(sign);
      // door glow
      const door=new THREE.Mesh(new THREE.BoxGeometry(3,4,0.5),
        new THREE.MeshBasicMaterial({color:0xffe082}));
      door.position.set(d.pos[0], 2, d.pos[1]+d.size[2]/2+0.3);
      scene.add(door);
      this.buildings.push({...d, mesh});
    });

    // scatter some trees / props
    for(let i=0;i<60;i++){
      const x=rint(-200,200), z=rint(-200,200);
      if(Math.abs(x)<10||Math.abs(z)<10) continue;
      if(this._nearBuilding(x,z,20)) continue;
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.5,3),
        new THREE.MeshLambertMaterial({color:0x6b4a2a}));
      trunk.position.set(x,1.5,z);
      const leaves=new THREE.Mesh(new THREE.ConeGeometry(2.4,4,8),
        new THREE.MeshLambertMaterial({color:0x2f7d32}));
      leaves.position.set(x,4.5,z); leaves.castShadow=true;
      scene.add(trunk); scene.add(leaves);
    }

    // player vehicle (car/rv box) - hidden until driving
    this.vehicle=new THREE.Group();
    this.vehBody=new THREE.Mesh(new THREE.BoxGeometry(2.4,1.6,5),
      new THREE.MeshLambertMaterial({color:0x3f72af}));
    this.vehBody.position.y=1; this.vehBody.castShadow=true;
    this.vehicle.add(this.vehBody);
    const cab=new THREE.Mesh(new THREE.BoxGeometry(2.2,1,2.2),
      new THREE.MeshLambertMaterial({color:0x111522, transparent:true, opacity:.6}));
    cab.position.set(0,2,-0.4); this.vehicle.add(cab);
    [[-1,-1.6],[1,-1.6],[-1,1.6],[1,1.6]].forEach(([wx,wz])=>{
      const wheel=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,0.4,12),
        new THREE.MeshLambertMaterial({color:0x111111}));
      wheel.rotation.z=Math.PI/2; wheel.position.set(wx,0.5,wz); this.vehicle.add(wheel);
    });
    this.vehicle.position.set(-40,0,-15); scene.add(this.vehicle);
    this.vehHeading=0; this.vehSpeed=0;

    // delivery marker
    this.marker=new THREE.Mesh(new THREE.CylinderGeometry(2,2,0.3,24),
      new THREE.MeshBasicMaterial({color:0xffd54f}));
    this.marker.visible=false; this.marker.position.y=0.2; scene.add(this.marker);
    this.markerBeam=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.6,30,12),
      new THREE.MeshBasicMaterial({color:0xffd54f,transparent:true,opacity:.3}));
    this.markerBeam.visible=false; this.markerBeam.position.y=15; scene.add(this.markerBeam);

    // controls
    this.yaw=0; this.pitch=0;
    this._bindControls();
    window.addEventListener('resize', this._onResize=()=>this._resize());
    this._resize();
    this._loop();
  }
  _makeLabel(text){
    const c=document.createElement('canvas'); c.width=512; c.height=128;
    const ctx=c.getContext('2d');
    ctx.fillStyle='rgba(10,12,24,0.85)'; ctx.roundRect?ctx.roundRect(8,8,496,112,18):ctx.fillRect(8,8,496,112); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 56px Segoe UI, Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(text,256,64);
    const tex=new THREE.CanvasTexture(c);
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex}));
    spr.scale.set(16,4,1); return spr;
  }
  _nearBuilding(x,z,r){ return this.buildings?.some(b=>Math.hypot(b.pos[0]-x,b.pos[1]-z)<r); }
  _bindControls(){
    const el=this.renderer.domElement;
    el.addEventListener('click',()=>{ if(this.enabled && !this.controlsLocked) el.requestPointerLock(); });
    document.addEventListener('pointerlockchange',()=>{
      this.pointerLocked = (document.pointerLockElement===el);
    });
    document.addEventListener('mousemove',(e)=>{
      if(!this.pointerLocked||!this.enabled) return;
      this.yaw   -= e.movementX*0.0022;
      this.pitch -= e.movementY*0.0022;
      this.pitch = Math.max(-1.2, Math.min(1.2, this.pitch));
    });
    window.addEventListener('keydown',(e)=>{
      this.keys[e.code]=true;
      if(e.code==='KeyV' && this.enabled) this.toggleVehicle();
    });
    window.addEventListener('keyup',(e)=>{ this.keys[e.code]=false; });
  }
  toggleVehicle(){
    if(!this.inVehicle){
      // must be near vehicle to enter
      const d=Math.hypot(this.cam.position.x-this.vehicle.position.x, this.cam.position.z-this.vehicle.position.z);
      if(d>6 && !this._teleported){ /* allow if far the first time? require near */ }
      this.inVehicle=true;
    } else {
      this.inVehicle=false;
      // step out beside vehicle
      this.cam.position.x=this.vehicle.position.x+3;
      this.cam.position.z=this.vehicle.position.z;
    }
    this.hooks.onVehicle?.(this.inVehicle);
  }
  setVehicleColor(hex){ this.vehBody.material.color.set(hex); }
  setVehicleSpeed(mult){ this.speedMult=mult; }
  startDelivery(){
    const x=rint(-160,160), z=rint(-160,160);
    this.delivery={x,z};
    this.marker.position.set(x,0.2,z); this.marker.visible=true;
    this.markerBeam.position.set(x,15,z); this.markerBeam.visible=true;
  }
  stopDelivery(){ this.delivery=null; this.marker.visible=false; this.markerBeam.visible=false; }
  _resize(){
    const W=this.mount.clientWidth, H=this.mount.clientHeight;
    this.cam.aspect=W/H; this.cam.updateProjectionMatrix(); this.renderer.setSize(W,H);
  }
  setEnabled(v){ this.enabled=v; if(!v && document.pointerLockElement) document.exitPointerLock(); }
  _loop(){
    this.raf=requestAnimationFrame(()=>this._loop());
    const dt=0.016;
    if(this.enabled){
      const speedMul=this.speedMult||1;
      if(this.inVehicle){
        // drive
        let accel=0, steer=0;
        if(this.keys['KeyW']||this.keys['ArrowUp']) accel+=1;
        if(this.keys['KeyS']||this.keys['ArrowDown']) accel-=1;
        if(this.keys['KeyA']||this.keys['ArrowLeft']) steer+=1;
        if(this.keys['KeyD']||this.keys['ArrowRight']) steer-=1;
        this.vehSpeed += accel*0.5*speedMul;
        this.vehSpeed *= 0.94;
        this.vehSpeed = Math.max(-0.6, Math.min(1.4*speedMul, this.vehSpeed));
        if(Math.abs(this.vehSpeed)>0.02) this.vehHeading += steer*0.03*(this.vehSpeed>0?1:-1);
        this.vehicle.position.x += Math.sin(this.vehHeading)*this.vehSpeed;
        this.vehicle.position.z += Math.cos(this.vehHeading)*this.vehSpeed;
        this.vehicle.rotation.y = this.vehHeading;
        // camera behind/above (third person-ish first person from cab)
        const camDist=7, camH=4;
        this.cam.position.x = this.vehicle.position.x - Math.sin(this.vehHeading)*camDist;
        this.cam.position.z = this.vehicle.position.z - Math.cos(this.vehHeading)*camDist;
        this.cam.position.y = camH;
        this.cam.lookAt(this.vehicle.position.x, 2, this.vehicle.position.z);
        this.playerX=this.vehicle.position.x; this.playerZ=this.vehicle.position.z;
      } else {
        // walk
        const sp=0.32;
        const fwd=new THREE.Vector3(Math.sin(this.yaw),0,Math.cos(this.yaw));
        const right=new THREE.Vector3(Math.sin(this.yaw-Math.PI/2),0,Math.cos(this.yaw-Math.PI/2));
        let mv=new THREE.Vector3();
        if(this.keys['KeyW']||this.keys['ArrowUp']) mv.sub(fwd);
        if(this.keys['KeyS']||this.keys['ArrowDown']) mv.add(fwd);
        if(this.keys['KeyA']||this.keys['ArrowLeft']) mv.sub(right);
        if(this.keys['KeyD']||this.keys['ArrowRight']) mv.add(right);
        if(mv.length()>0){ mv.normalize().multiplyScalar(sp); this.cam.position.add(mv); }
        this.cam.position.y=1.7;
        // look
        const dir=new THREE.Vector3(
          Math.sin(this.yaw)*Math.cos(this.pitch),
          Math.sin(this.pitch),
          Math.cos(this.yaw)*Math.cos(this.pitch));
        this.cam.lookAt(this.cam.position.clone().add(dir));
        this.playerX=this.cam.position.x; this.playerZ=this.cam.position.z;
      }
      // clamp world
      this.cam.position.x=Math.max(-280,Math.min(280,this.cam.position.x));
      this.cam.position.z=Math.max(-280,Math.min(280,this.cam.position.z));

      // proximity to buildings (size-aware: bigger buildings have a bigger reach)
      let near=null, bestScore=0;
      for(const b of this.buildings){
        const d=Math.hypot(b.pos[0]-this.playerX, b.pos[1]-this.playerZ);
        const reach=Math.max(b.size[0],b.size[2])/2 + 9;
        if(d<reach){ const score=reach-d; if(score>bestScore){ bestScore=score; near=b.id; } }
      }
      if(near!==this._near){ this._near=near; this.hooks.onNear?.(near); }

      // delivery check
      if(this.delivery){
        const d=Math.hypot(this.delivery.x-this.playerX, this.delivery.z-this.playerZ);
        this.marker.rotation.y+=0.03;
        if(d<5){ const cb=this.delivery; this.stopDelivery(); this.hooks.onDeliveryDone?.(); }
      }
    }
    this.renderer.render(this.scene,this.cam);
  }
  setTime(t){ // 0-24 -> move sun & sky
    const day = Math.max(0,Math.sin((t-6)/12*Math.PI)); // 0 at night, 1 noon
    this.sun.intensity=0.2+day*0.9;
    this.amb.intensity=0.3+day*0.4;
    const top=new THREE.Color(0x0b1020), noon=new THREE.Color(0x87b8e8);
    const sky=top.clone().lerp(noon,day);
    this.scene.background=sky; if(this.scene.fog) this.scene.fog.color=sky;
    this.sun.position.set(Math.cos((t-6)/12*Math.PI)*80, 20+day*80, 20);
  }
  teleportTo(id){
    const b=this.buildings.find(x=>x.id===id); if(!b) return;
    if(this.inVehicle) this.toggleVehicle();
    this.cam.position.set(b.pos[0], 1.7, b.pos[1]+b.size[2]/2+5);
    this.yaw=Math.PI; this.pitch=0;
    this.playerX=this.cam.position.x; this.playerZ=this.cam.position.z;
  }
  dispose(){ cancelAnimationFrame(this.raf); window.removeEventListener('resize',this._onResize);
    this.renderer.dispose(); if(this.renderer.domElement.parentNode) this.renderer.domElement.parentNode.removeChild(this.renderer.domElement); }
}

function Modal({children,onClose,wide}){
  return (<div style={{position:'fixed',inset:0,background:'rgba(4,6,16,.72)',zIndex:30,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>

}

// ── Interview minigame ──
function Interview({job, onResult, onClose}){
  const [qs] = useState(()=>shuffle(INTERVIEW_QUESTIONS).slice(0,5).map(q=>{
    const opts=q[1].map((t,i)=>({t,correct:i===q[2]}));
    return {q:q[0], opts:shuffle(opts)};
  }));
  const [i,setI]=useState(0);
  const [right,setRight]=useState(0);
  const [wrong,setWrong]=useState(0);
  const [picked,setPicked]=useState(null);
  const cur=qs[i];
  function choose(opt,idx){
    if(picked!=null) return;
    setPicked(idx);
    const r=right+(opt.correct?1:0), w=wrong+(opt.correct?0:1);
    setTimeout(()=>{
      if(opt.correct){
        if(r>=3){ onResult(true); return; }
        setRight(r);
      } else {
        if(w>=3){ onResult(false); return; }
        setWrong(w);
      }
      setPicked(null); setI(x=>x+1);
    },650);
  }
  return (<Modal onClose={onClose}>
    <div style={{padding:24}}>
      <div style={{fontSize:13,opacity:.7}}>Interview for</div>
      <h2 style={{margin:'2px 0 6px'}}>{job.emoji} {job.title}</h2>
      <div style={{display:'flex',gap:16,marginBottom:14,fontSize:14}}>
        <span style={{color:'#7ee0a0'}}>✅ Correct: {right}/3</span>
        <span style={{color:'#ff8a8a'}}>❌ Wrong: {wrong}/3</span>
      </div>
      <div style={{background:'rgba(255,255,255,.06)',borderRadius:12,padding:16}}>
        <div style={{fontSize:17,fontWeight:600,marginBottom:14}}>“{cur.q}”</div>
        {cur.opts.map((o,idx)=>{
          let bg='rgba(255,255,255,.08)';
          if(picked!=null){ if(o.correct) bg='rgba(40,180,100,.55)'; else if(idx===picked) bg='rgba(220,70,60,.55)'; }
          return <button key={idx} onClick={()=>choose(o,idx)} style={{display:'block',width:'100%',textAlign:'left',margin:'8px 0',padding:'12px 14px',borderRadius:10,border:'1px solid rgba(255,255,255,.12)',background:bg,color:'#fff',cursor:picked!=null?'default':'pointer',fontSize:15}}>{o.t}</button>;
        })}
      </div>
      <div style={{marginTop:12,fontSize:12,opacity:.6}}>Get 3 correct to be hired. 3 wrong and you're rejected.</div>
    </div>
  </Modal>);
}

// ── Work minigames ──
function WorkGame({job, onDone, onClose, startDelivery, deliverySignal}){
  const arch=job.archetype;
  // ---- delivery handled by 3D world ----
  if(arch==='delivery'){
    return (<Modal onClose={onClose}><div style={{padding:24,textAlign:'center'}}>

function ClickerGame({job,onDone,onClose}){
  const [score,setScore]=useState(0);
  const [time,setTime]=useState(8);
  useEffect(()=>{ if(time<=0){ onDone(0.4+Math.min(0.8,score/40)); return;} const t=setTimeout(()=>setTime(time-0.1),100); return ()=>clearTimeout(t); },[time]);
  return (<Modal onClose={onClose}><div style={{padding:24,textAlign:'center'}}>
    <h2>{job.emoji} {job.title}</h2>
    <p style={{opacity:.8}}>Serve as many customers as you can! Tap fast for {Math.ceil(time)}s.</p>
    <div style={{fontSize:40,fontWeight:800,margin:'10px 0'}}>{score}</div>
    <button onClick={()=>setScore(s=>s+1)} style={{width:170,height:170,borderRadius:'50%',border:'none',background:'radial-gradient(circle at 35% 30%,#ffe082,#e6a417)',fontSize:48,cursor:'pointer',boxShadow:'0 8px 20px rgba(0,0,0,.4)'}}>🛎️</button>
    <div style={{marginTop:14}}><Bar label="Time" val={Math.ceil(time*10)/10} max={8} color="#4dd0e1"/></div>
  </div></Modal>);
}

function TimingGame({job,onDone,onClose}){
  const [pos,setPos]=useState(0); const [dir,setDir]=useState(1);
  const [hits,setHits]=useState(0); const [tries,setTries]=useState(0);
  const [msg,setMsg]=useState("");
  const raf=useRef();
  useEffect(()=>{
    let p=0,d=1;
    const tick=()=>{ p+=d*0.018; if(p>1){p=1;d=-1;} if(p<0){p=0;d=1;} setPos(p); setDir(d); raf.current=requestAnimationFrame(tick); };
    raf.current=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf.current);
  },[]);
  function hit(){
    const inZone = pos>0.42 && pos<0.58;
    const nt=tries+1, nh=hits+(inZone?1:0);
    setMsg(inZone?"Perfect! ⚙️":"Missed!");
    setHits(nh); setTries(nt);
    if(nt>=5){ cancelAnimationFrame(raf.current); setTimeout(()=>onDone(0.3+nh/5*0.9),400); }
  }
  return (<Modal onClose={onClose}><div style={{padding:24,textAlign:'center'}}>
    <h2>{job.emoji} {job.title}</h2>
    <p style={{opacity:.8}}>Stop the marker in the green zone. 5 attempts. ({hits}/{tries})</p>
    <div style={{position:'relative',height:30,background:'rgba(255,255,255,.1)',borderRadius:15,margin:'18px 0',overflow:'hidden'}}>
      <div style={{position:'absolute',left:'42%',width:'16%',height:'100%',background:'rgba(40,180,100,.5)'}}/>
      <div style={{position:'absolute',left:`calc(${pos*100}% - 4px)`,width:8,height:'100%',background:'#fff',borderRadius:4}}/>
    </div>
    <div style={{height:20,color:'#ffd54f',fontWeight:600}}>{msg}</div>
    <button className="btn gold" onClick={hit} style={{marginTop:8,width:200}}>STOP</button>
  </div></Modal>);
}

function MemoryGame({job,onDone,onClose}){
  const colors=['#e0524a','#3f72af','#23b26d','#e6a417'];
  const [seq,setSeq]=useState([]); const [userIdx,setUserIdx]=useState(0);
  const [flash,setFlash]=useState(-1); const [phase,setPhase]=useState('show');
  const [round,setRound]=useState(1);
  useEffect(()=>{ // new round
    const ns=[...seq, rint(0,3)]; setSeq(ns); setPhase('show'); setUserIdx(0);
    let i=0; const iv=setInterval(()=>{ setFlash(ns[i]); setTimeout(()=>setFlash(-1),300); i++; if(i>=ns.length){ clearInterval(iv); setTimeout(()=>setPhase('input'),350);} },600);
    return ()=>clearInterval(iv);
  },[round]);
  function press(c){
    if(phase!=='input') return;
    setFlash(c); setTimeout(()=>setFlash(-1),150);
    if(c!==seq[userIdx]){ setTimeout(()=>onDone(0.3+Math.min(0.9,(round-1)/5)),300); return; }
    const ni=userIdx+1;
    if(ni>=seq.length){ if(round>=5){ setTimeout(()=>onDone(1.2),300); } else { setTimeout(()=>setRound(r=>r+1),500);} }
    setUserIdx(ni);
  }
  return (<Modal onClose={onClose}><div style={{padding:24,textAlign:'center'}}>
    <h2>{job.emoji} {job.title}</h2>
    <p style={{opacity:.8}}>{phase==='show'?'Watch the sequence…':'Now repeat it!'} (Round {round}/5)</p>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,maxWidth:260,margin:'16px auto'}}>
      {colors.map((c,i)=><button key={i} onClick={()=>press(i)} style={{height:90,borderRadius:14,border:'none',cursor:'pointer',background:c,opacity:flash===i?1:0.45,transition:'opacity .12s',boxShadow:flash===i?'0 0 24px '+c:'none'}}/>)}
    </div>
  </div></Modal>);
}

function QuizWorkGame({job,onDone,onClose}){
  const [qs]=useState(()=>shuffle(INTERVIEW_QUESTIONS).slice(0,4).map(q=>({q:q[0],opts:shuffle(q[1].map((t,i)=>({t,c:i===q[2]})))})));
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [picked,setPicked]=useState(null);
  const cur=qs[i];
  function choose(o,idx){ if(picked!=null)return; setPicked(idx); const ns=score+(o.c?1:0);
    setTimeout(()=>{ if(i+1>=qs.length){ onDone(0.3+ns/qs.length*1.0);} else {setScore(ns);setPicked(null);setI(i+1);} },500); }
  return (<Modal onClose={onClose}><div style={{padding:24}}>
    <h2 style={{textAlign:'center'}}>{job.emoji} {job.title}</h2>
    <p style={{opacity:.8,textAlign:'center'}}>Handle the situation correctly. ({i+1}/{qs.length})</p>
    <div style={{fontSize:16,fontWeight:600,margin:'10px 0'}}>{cur.q}</div>
    {cur.opts.map((o,idx)=>{ let bg='rgba(255,255,255,.08)'; if(picked!=null){ if(o.c)bg='rgba(40,180,100,.5)'; else if(idx===picked)bg='rgba(220,70,60,.5)';}
      return <button key={idx} onClick={()=>choose(o,idx)} style={{display:'block',width:'100%',textAlign:'left',margin:'7px 0',padding:'11px 13px',borderRadius:10,border:'1px solid rgba(255,255,255,.12)',background:bg,color:'#fff',cursor:'pointer'}}>{o.t}</button>;})}
  </div></Modal>);
}

function PhoneMemory(){
  const emojis=['🍎','🚗','🌟','🎈','🍕','🐶','🌈','⚽'];
  const [cards,setCards]=useState(()=>shuffle([...emojis,...emojis].map((e,i)=>({i,e,flipped:false,done:false}))));
  const [sel,setSel]=useState([]);
  function flip(c){ if(c.flipped||c.done||sel.length>=2)return; const nc=cards.map(x=>x.i===c.i?{...x,flipped:true}:x); setCards(nc); const ns=[...sel,c]; setSel(ns);
    if(ns.length===2){ setTimeout(()=>{ if(ns[0].e===ns[1].e){ setCards(cs=>cs.map(x=>x.e===ns[0].e?{...x,done:true}:x)); } else { setCards(cs=>cs.map(x=>(x.i===ns[0].i||x.i===ns[1].i)?{...x,flipped:false}:x)); } setSel([]); },700); } }
  const won=cards.every(c=>c.done);
  return <div style={{textAlign:'center'}}><h3>🧩 Memory Match</h3>{won&&<div style={{color:'#7ee0a0',marginBottom:8}}>You won! 🎉</div>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>{cards.map(c=><div key={c.i} onClick={()=>flip(c)} style={{aspectRatio:'1',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,cursor:'pointer',background:c.flipped||c.done?'rgba(255,255,255,.18)':'rgba(46,125,255,.5)'}}>{(c.flipped||c.done)?c.e:'?'}</div>)}</div></div>;
}

function App(){
  const [state,setState]=useState(loadState);
  const stateRef=useRef(state); stateRef.current=state;
  const [near,setNear]=useState(null);
  const [panel,setPanel]=useState(null); // 'jobs','mall','houses','rvs','cars','phone'
  const [interviewJob,setInterviewJob]=useState(null);
  const [workJob,setWorkJob]=useState(null);
  const [toast,setToast]=useState("");
  const [levelUp,setLevelUp]=useState(null);
  const [showGift,setShowGift]=useState(false);
  const [pendingDelivery,setPendingDelivery]=useState(null);
  const worldRef=useRef(null);
  const mountRef=useRef(null);

  // boot world
  useEffect(()=>{
    document.getElementById('boot').style.display='none';
    let world;
    try{
      world=new World(mountRef.current,{
        onNear:(id)=>setNear(id),
        onVehicle:(v)=>setToast(v?'🚗 Driving — WASD to drive, V to exit':''),
        onDeliveryDone:()=>{ finishWork(0.95, true); }
      });
      worldRef.current=world;
      world.setTime(stateRef.current.timeOfDay);
      const c=CARS[stateRef.current.currentCar]; world.setVehicleColor(c.color); world.setVehicleSpeed(c.speed);
    }catch(e){ console.error(e); setToast('3D failed to load — UI still works'); }
    // daily gift check
    if(stateRef.current.lastGiftDate!==todayStr()) setShowGift(true);
    return ()=>{ world&&world.dispose(); };
  },[]);

  // disable world controls when a panel/modal is open
  useEffect(()=>{
    const blocking = panel||interviewJob||workJob||levelUp||showGift;
    worldRef.current?.setEnabled(!blocking);
  },[panel,interviewJob,workJob,levelUp,showGift]);

  // time progression (gentle) — only counts when no modal open
  useEffect(()=>{
    const iv=setInterval(()=>{
      setState(s=>{
        let t=s.timeOfDay+0.02;
        worldRef.current?.setTime(t);
        if(t>=24){ // new day
          t-=24;
          const income=HOUSES[s.currentHouse].income;
          return {...s, timeOfDay:t, day:s.day+1, shiftsToday:0, money:s.money+income};
        }
        return {...s, timeOfDay:t};
      });
    },1000);
    return ()=>clearInterval(iv);
  },[]);

  // persist
  useEffect(()=>{ localStorage.setItem(SAVE_KEY,JSON.stringify(state)); },[state]);

  function flash(m){ setToast(m); setTimeout(()=>setToast(""),2600); }

  function grantXP(amount){
    setState(s=>{
      let xp=s.xp+amount, level=s.level;
      let leveled=null;
      while(xp>=xpForLevel(level+1)){ xp-=xpForLevel(level+1); level++; leveled=level; }
      if(leveled){
        const reward=prizeForLevel(leveled);
        setTimeout(()=>setLevelUp({level:leveled,reward}),300);
        return applyPrize({...s,xp,level},reward);
      }
      return {...s,xp,level};
    });
  }
  function prizeForLevel(lvl){
    const prizes={3:{emoji:'🚐',text:'Road Cruiser RV',kind:'rv',id:1},5:{emoji:'🏎️',text:'Sporty Coupe',kind:'car',id:2},
      7:{emoji:'🏘️',text:'Modern Villa',kind:'house',id:3},10:{emoji:'💰',text:money(5000)+' bonus',kind:'cash',amt:5000}};
    return prizes[lvl]|| {emoji:'💰',text:money(lvl*200)+' bonus',kind:'cash',amt:lvl*200};
  }
  function applyPrize(s,reward){
    if(!reward) return s;
    if(reward.kind==='cash') return {...s,money:s.money+reward.amt};
    if(reward.kind==='rv' && !s.ownedRVs.includes(reward.id)) return {...s,ownedRVs:[...s.ownedRVs,reward.id]};
    if(reward.kind==='car' && !s.ownedCars.includes(reward.id)) return {...s,ownedCars:[...s.ownedCars,reward.id]};
    if(reward.kind==='house' && !s.ownedHouses.includes(reward.id)) return {...s,ownedHouses:[...s.ownedHouses,reward.id]};
    return s;
  }

  // ── job application & work ──
  function applyJob(job){ setPanel(null); setInterviewJob(job); }
  function interviewResult(passed){
    const job=interviewJob; setInterviewJob(null);
    if(passed){ setState(s=>({...s,jobId:job.id,stats:{...s.stats,interviewsPassed:s.stats.interviewsPassed+1}}));
      flash(`🎉 Hired as ${job.title}!`); grantXP(40);
    } else { flash(`❌ Not hired for ${job.title}. Try again or pick another job.`); }
  }
  function startWork(job){
    if(stateRef.current.shiftsToday>=2){ flash('You already worked 2 shifts today. Come back tomorrow!'); return; }
    setPanel(null); setWorkJob(job);
  }
  function finishWork(performance, fromDelivery){
    const job= fromDelivery? JOBS[stateRef.current.jobId] : workJob;
    if(!job){ setWorkJob(null); return; }
    setWorkJob(null);
    const lvl=stateRef.current.level;
    const pay=Math.round(job.basePay*(0.7+performance*0.8)*(1+lvl*0.05));
    const xp=Math.round(20+performance*30);
    setState(s=>({...s, money:s.money+pay, shiftsToday:s.shiftsToday+1, timeOfDay:Math.min(23.5,s.timeOfDay+3),
      stats:{...s.stats, shiftsWorked:s.stats.shiftsWorked+1, moneyEarned:s.stats.moneyEarned+pay}}));
    flash(`💵 Shift done! +${money(pay)} · +${xp} XP`);
    grantXP(xp);
  }

  // ── purchases ──
  function buyItem(kind,item){
    setState(s=>{
      if(s.money<item.price) return s;
      const ownedKey={houses:'ownedHouses',rvs:'ownedRVs',cars:'ownedCars'}[kind];
      const ns={...s, money:s.money-item.price, [ownedKey]:[...s[ownedKey],item.id]};
      return ns;
    });
    flash(`✅ Bought ${item.name}!`);
    equipItem(kind,item.id);
  }
  function equipItem(kind,id){
    const curKey={houses:'currentHouse',rvs:'currentRV',cars:'currentCar'}[kind];
    setState(s=>({...s,[curKey]:id}));
    if(kind==='cars'){ const c=CARS[id]; worldRef.current?.setVehicleColor(c.color); worldRef.current?.setVehicleSpeed(c.speed); }
    if(kind==='rvs'){ const r=RVS[id]; worldRef.current?.setVehicleColor(r.color); worldRef.current?.setVehicleSpeed(r.speed); }
  }
  function buyStoreItem(s){
    if(state.money<s.price) return;
    setState(p=>({...p,money:p.money-s.price,inventory:[...p.inventory,s.id]}));
    flash(`🛍️ Bought ${s.itemName}! +${s.xp} XP`); grantXP(s.xp);
  }

  function claimGift(r){
    setState(s=>{ let ns=r.apply({...s,lastGiftDate:todayStr()}); return ns; });
    if(r.text.includes('XP')) grantXP(80);
    setShowGift(false); flash(`🎁 Claimed ${r.text}!`);
  }

  // building -> panel map
  const buildingPanel={ home:'home', jobs:'jobs', mall:'mall', cars:'cars', rvs:'rvs', bank:'bank' };
  const buildingNames={home:'🏠 Home',jobs:'💼 Job Center',mall:'🛍️ Mall',cars:'🚗 Car Dealer',rvs:'🚐 RV Dealer',bank:'🏦 Bank & Houses'};

  // keyboard: E to enter, P phone
  useEffect(()=>{
    const h=(e)=>{
      if(e.code==='KeyE' && near && !panel && !interviewJob && !workJob){ openBuilding(near); }
      if(e.code==='KeyP'){ setPanel(p=>p==='phone'?null:'phone'); }
      if(e.code==='Escape'){ setPanel(null); }
    };
    window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h);
  },[near,panel,interviewJob,workJob]);

  function openBuilding(id){
    if(id==='home'){ setPanel('houses'); }
    else if(id==='bank'){ setPanel('houses'); }
    else setPanel(buildingPanel[id]);
  }

  const xpNext=xpForLevel(state.level+1);
  const curJob=state.jobId!=null?JOBS[state.jobId]:null;

  return (<div id="game">
    <div id="canvas-wrap" ref={mountRef}/>

    {/* crosshair */}
    <div style={{position:'fixed',top:'50%',left:'50%',width:6,height:6,marginLeft:-3,marginTop:-3,borderRadius:'50%',background:'rgba(255,255,255,.6)',pointerEvents:'none'}}/>

    {/* HUD top-left */}
    <div style={{position:'fixed',top:14,left:14,width:230,background:'rgba(12,18,34,.82)',borderRadius:14,padding:14,backdropFilter:'blur(6px)',border:'1px solid rgba(255,255,255,.1)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div><div style={{fontSize:12,opacity:.7}}>Level {state.level}</div><div style={{fontSize:22,fontWeight:800,color:'#7ee0a0'}}>{money(state.money)}</div></div>
        <div style={{textAlign:'right',fontSize:12,opacity:.8}}>Day {state.day}<br/>{String(Math.floor(state.timeOfDay)).padStart(2,'0')}:{String(Math.floor((state.timeOfDay%1)*60)).padStart(2,'0')}</div>
      </div>
      <Bar label="XP" val={Math.round(state.xp)} max={xpNext} color="#9b6bff"/>
      <div style={{fontSize:12,marginTop:6,opacity:.85}}>{curJob?`${curJob.emoji} ${curJob.title} · ${state.shiftsToday}/2 shifts`:'🙅 Unemployed — visit Job Center'}</div>
    </div>

    {/* quick teleport / controls bottom-left */}
    <div style={{position:'fixed',bottom:14,left:14,display:'flex',gap:6,flexWrap:'wrap',maxWidth:260}}>
      {Object.keys(buildingNames).map(id=>(
        <button key={id} className="btn gray" style={{padding:'6px 9px',fontSize:11}} onClick={()=>{ worldRef.current?.teleportTo(id); }}>{buildingNames[id].split(' ')[0]}</button>
      ))}
    </div>

    {/* phone button bottom-right */}
    <button onClick={()=>setPanel('phone')} style={{position:'fixed',bottom:14,right:14,width:60,height:60,borderRadius:18,border:'none',background:'linear-gradient(160deg,#2e7dff,#1b3a7a)',fontSize:28,cursor:'pointer',boxShadow:'0 8px 20px rgba(0,0,0,.5)'}}>📱</button>

    {/* interaction prompt */}
    {near && !panel && !interviewJob && !workJob && <div style={{position:'fixed',bottom:90,left:'50%',transform:'translateX(-50%)',background:'rgba(12,18,34,.9)',borderRadius:12,padding:'10px 18px',border:'1px solid rgba(255,255,255,.15)',fontSize:15}}>
      Press <b style={{color:'#ffd54f'}}>E</b> to enter {buildingNames[near]}</div>}

    {/* help hint top-right */}
    <div style={{position:'fixed',top:14,right:14,background:'rgba(12,18,34,.7)',borderRadius:10,padding:'8px 12px',fontSize:11,opacity:.85,maxWidth:200,textAlign:'right'}}>
      <b>WASD</b> move · <b>Mouse</b> look · <b>V</b> drive · <b>E</b> enter · <b>P</b> phone
    </div>

    <Toast msg={toast}/>

    {/* PANELS */}
    {panel==='jobs' && <JobCenter state={state} onApply={applyJob} onWork={startWork} onClose={()=>setPanel(null)}/>}
    {panel==='mall' && <Mall state={state} onBuy={buyStoreItem} onClose={()=>setPanel(null)}/>}
    {(panel==='houses') && <Shop kind="houses" state={state} onBuy={buyItem} onEquip={equipItem} onClose={()=>setPanel(null)}/>}
    {panel==='rvs' && <Shop kind="rvs" state={state} onBuy={buyItem} onEquip={equipItem} onClose={()=>setPanel(null)}/>}
    {panel==='cars' && <Shop kind="cars" state={state} onBuy={buyItem} onEquip={equipItem} onClose={()=>setPanel(null)}/>}
    {panel==='phone' && <Phone state={state} setState={setState} onClose={()=>setPanel(null)}/>}

    {interviewJob && <Interview job={interviewJob} onResult={interviewResult} onClose={()=>setInterviewJob(null)}/>}
    {workJob && <WorkGame job={workJob} onDone={(p)=>finishWork(p,false)} onClose={()=>setWorkJob(null)}
        startDelivery={()=>{ worldRef.current?.startDelivery(); flash('📍 Drive/walk to the glowing marker!'); }}/>}
    {levelUp && <LevelUp level={levelUp.level} reward={levelUp.reward} onClose={()=>setLevelUp(null)}/>}
    {showGift && <DailyGift day={state.day} onClaim={claimGift} onClose={()=>{ setState(s=>({...s,lastGiftDate:todayStr()})); setShowGift(false); }}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
