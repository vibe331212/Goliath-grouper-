    const o=_actx.createOscillator(), g=_actx.createGain();
    o.type=type; o.frequency.value=freq; g.gain.value=vol;
    o.connect(g); g.connect(_actx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001,_actx.currentTime+dur); o.stop(_actx.currentTime+dur);
  }catch(e){}
}

/* ============================================================================
   WORLD2D — top-down canvas world (walk + drive), no 3D
   ========================================================================== */
class World2D {
  constructor(canvas, hooks){
    this.canvas=canvas; this.ctx=canvas.getContext('2d'); this.hooks=hooks;
    this.keys={}; this.touch={up:false,down:false,left:false,right:false};
    this.px=-40; this.py=-12; this.heading=-Math.PI/2;
    this.inVehicle=false; this.enabled=true; this.delivery=null; this.speedMult=1.1;
    this.vehColor="#3f72af"; this.t=8; this._near=null; this._pulse=0;
    this._bind(); this._resize(); this._loop();
  }
  _bind(){
    this._onResize=()=>this._resize(); window.addEventListener('resize',this._onResize);
    this._kd=(e)=>{ this.keys[e.code]=true; if(e.code==='KeyV'&&this.enabled) this.toggleVehicle(); };
    this._ku=(e)=>{ this.keys[e.code]=false; };
    window.addEventListener('keydown',this._kd); window.addEventListener('keyup',this._ku);
  }
  _resize(){ const dpr=Math.min(window.devicePixelRatio||1,2);
    this.canvas.width=this.canvas.clientWidth*dpr; this.canvas.height=this.canvas.clientHeight*dpr;
    this.ctx.setTransform(dpr,0,0,dpr,0,0); this.vw=this.canvas.clientWidth; this.vh=this.canvas.clientHeight; }
  setTouch(dir,v){ this.touch[dir]=v; }
  toggleVehicle(){ this.inVehicle=!this.inVehicle; this.hooks.onVehicle?.(this.inVehicle); }
  setVehicle(color,speed){ this.vehColor=color; this.speedMult=speed; }
  setEnabled(v){ this.enabled=v; }
  setTime(t){ this.t=t; }
  teleportTo(id){ const b=BUILDINGS.find(x=>x.id===id); if(!b) return;
    this.px=b.pos[0]; this.py=b.pos[1]+b.h/2+5; this.heading=-Math.PI/2; }
  startDelivery(){ this.delivery={x:rint(-150,150), y:rint(-150,150)}; }
  stopDelivery(){ this.delivery=null; }
  dispose(){ cancelAnimationFrame(this.raf); window.removeEventListener('resize',this._onResize);
    window.removeEventListener('keydown',this._kd); window.removeEventListener('keyup',this._ku); }
  _loop(){
    this.raf=requestAnimationFrame(()=>this._loop());
    if(this.enabled){
      let dx=0,dy=0;
      if(this.keys['KeyW']||this.keys['ArrowUp']||this.touch.up) dy-=1;
      if(this.keys['KeyS']||this.keys['ArrowDown']||this.touch.down) dy+=1;
      if(this.keys['KeyA']||this.keys['ArrowLeft']||this.touch.left) dx-=1;
      if(this.keys['KeyD']||this.keys['ArrowRight']||this.touch.right) dx+=1;
      const moving=dx||dy;
      if(moving){ const l=Math.hypot(dx,dy); dx/=l; dy/=l;
        const sp=this.inVehicle?(1.9*this.speedMult):1.7;
        this.px=Math.max(-240,Math.min(240,this.px+dx*sp));
        this.py=Math.max(-240,Math.min(240,this.py+dy*sp));
        this.heading=Math.atan2(dy,dx);
      }
      // proximity (size-aware)
      let near=null,best=0;
      for(const b of BUILDINGS){ const d=Math.hypot(b.pos[0]-this.px,b.pos[1]-this.py);
        const reach=Math.max(b.w,b.h)/2+10; if(d<reach){ const s=reach-d; if(s>best){best=s;near=b.id;} } }
      if(near!==this._near){ this._near=near; this.hooks.onNear?.(near); }
      // delivery
      if(this.delivery){ const d=Math.hypot(this.delivery.x-this.px,this.delivery.y-this.py);
        if(d<7){ this.stopDelivery(); this.hooks.onDeliveryDone?.(); } }
    }
    this._draw();
  }
  _draw(){
    const ctx=this.ctx, vw=this.vw, vh=this.vh, S=5.2;
    const camX=this.px, camY=this.py;
    const sx=(wx)=>vw/2+(wx-camX)*S, sy=(wy)=>vh/2+(wy-camY)*S;
    // ground
    ctx.fillStyle="#5fa55a"; ctx.fillRect(0,0,vw,vh);
    // road grid
    ctx.strokeStyle="#37383c"; ctx.lineWidth=11*S;
    for(let g=-240;g<=240;g+=80){ ctx.beginPath(); ctx.moveTo(sx(g),sy(-260)); ctx.lineTo(sx(g),sy(260)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx(-260),sy(g)); ctx.lineTo(sx(260),sy(g)); ctx.stroke(); }
    // lane dashes
    ctx.strokeStyle="rgba(255,255,255,.5)"; ctx.lineWidth=1.5; ctx.setLineDash([8,12]);
    for(let g=-240;g<=240;g+=80){ ctx.beginPath(); ctx.moveTo(sx(g),sy(-260)); ctx.lineTo(sx(g),sy(260)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx(-260),sy(g)); ctx.lineTo(sx(260),sy(g)); ctx.stroke(); }
    ctx.setLineDash([]);
    // trees (deterministic scatter)
    ctx.fillStyle="#2f7d32";
    for(let i=0;i<120;i++){ const tx=((i*131)%500)-250, ty=((i*271)%500)-250;
      if(Math.abs(tx)<14||Math.abs(ty)<14) continue;
      const dxn=sx(tx),dyn=sy(ty); if(dxn<-20||dxn>vw+20||dyn<-20||dyn>vh+20) continue;
      ctx.beginPath(); ctx.arc(dxn,dyn,3.4*S/3,0,7); ctx.fill(); }
    // buildings
    BUILDINGS.forEach(b=>{
      const x=sx(b.pos[0]-b.w/2), y=sy(b.pos[1]-b.h/2), w=b.w*S, h=b.h*S;
      ctx.fillStyle="rgba(0,0,0,.25)"; ctx.fillRect(x+4,y+5,w,h);
      ctx.fillStyle=b.color; ctx.fillRect(x,y,w,h);
      // windows
      ctx.fillStyle="rgba(255,255,255,.35)";
      for(let wx=x+8;wx<x+w-8;wx+=16) for(let wy=y+8;wy<y+h-8;wy+=16) ctx.fillRect(wx,wy,7,7);
      // door
      ctx.fillStyle="#ffe082"; ctx.fillRect(x+w/2-7,y+h-10,14,10);
      // label
      ctx.fillStyle="rgba(10,12,24,.85)"; const lw=ctx.measureText?Math.max(70,b.name.length*8):90;
      ctx.font="bold 13px Segoe UI, Arial"; ctx.textAlign="center";
      const tw=ctx.measureText(b.name).width+16;
      ctx.fillRect(sx(b.pos[0])-tw/2, y-22, tw, 18);
      ctx.fillStyle="#fff"; ctx.fillText(b.name, sx(b.pos[0]), y-9);
    });
    // delivery marker
    if(this.delivery){ this._pulse+=0.08; const r=(8+Math.sin(this._pulse)*3)*S/2;
      const mx=sx(this.delivery.x), my=sy(this.delivery.y);
      ctx.fillStyle="rgba(255,213,79,.35)"; ctx.beginPath(); ctx.arc(mx,my,r,0,7); ctx.fill();
      ctx.fillStyle="#ffd54f"; ctx.beginPath(); ctx.arc(mx,my,5,0,7); ctx.fill();
      // off-screen arrow
      if(mx<0||mx>vw||my<0||my>vh){ const ang=Math.atan2(my-vh/2,mx-vw/2);
        const ex=vw/2+Math.cos(ang)*Math.min(vw,vh)*0.42, ey=vh/2+Math.sin(ang)*Math.min(vw,vh)*0.42;
        ctx.save(); ctx.translate(ex,ey); ctx.rotate(ang); ctx.fillStyle="#ffd54f";
        ctx.beginPath(); ctx.moveTo(12,0); ctx.lineTo(-8,-7); ctx.lineTo(-8,7); ctx.closePath(); ctx.fill(); ctx.restore(); }
    }
    // player
    const pmx=vw/2, pmy=vh/2;
    ctx.save(); ctx.translate(pmx,pmy); ctx.rotate(this.heading);
    if(this.inVehicle){
      ctx.fillStyle="rgba(0,0,0,.3)"; ctx.fillRect(-11,-8,26,18);
      ctx.fillStyle=this.vehColor; ctx.fillRect(-13,-9,26,18);
      ctx.fillStyle="#111522"; ctx.fillRect(2,-7,8,14);
    } else {
      ctx.fillStyle="rgba(0,0,0,.3)"; ctx.beginPath(); ctx.arc(0,2,9,0,7); ctx.fill();
      ctx.fillStyle="#ffce9e"; ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill();
      ctx.fillStyle="#2e3a59"; ctx.beginPath(); ctx.arc(5,0,3,0,7); ctx.fill();
    }
    ctx.restore();
    // night tint
    const day=Math.max(0,Math.sin((this.t-6)/12*Math.PI));
    if(day<0.9){ ctx.fillStyle=`rgba(8,12,30,${(0.9-day)*0.6})`; ctx.fillRect(0,0,vw,vh); }
  }
}

// ── Interview ──
function Interview({job,onResult,onClose}){
  const [qs]=useState(()=>shuffle(INTERVIEW_QUESTIONS).slice(0,5).map(q=>({q:q[0],opts:shuffle(q[1].map((t,i)=>({t,correct:i===q[2]})))})));
  const [i,setI]=useState(0); const [right,setRight]=useState(0); const [wrong,setWrong]=useState(0); const [picked,setPicked]=useState(null);
  const cur=qs[i];
  function choose(opt,idx){ if(picked!=null) return; setPicked(idx); opt.correct?SFX.good():SFX.bad();
    const r=right+(opt.correct?1:0), w=wrong+(opt.correct?0:1);
    setTimeout(()=>{ if(opt.correct){ if(r>=3){onResult(true);return;} setRight(r);} else { if(w>=3){onResult(false);return;} setWrong(w);} setPicked(null); setI(x=>x+1); },650);
  }
  return (<Modal onClose={onClose}><div style={{padding:24}}>
    <div style={{fontSize:13,opacity:.7}}>Interview for</div>
    <div style={{display:'flex',alignItems:'center',gap:10,margin:'4px 0 8px'}}><Badge label={job.badge} color={job.color}/><h2 style={{margin:0}}>{job.title}</h2></div>
    <div style={{display:'flex',gap:16,marginBottom:14,fontSize:14}}>
      <span style={{color:'#7ee0a0'}}>Correct: {right}/3</span><span style={{color:'#ff8a8a'}}>Wrong: {wrong}/3</span></div>
    <div style={{background:'rgba(255,255,255,.06)',borderRadius:12,padding:16}}>

      {cur.opts.map((o,idx)=>{ let bg='rgba(255,255,255,.08)'; if(picked!=null){ if(o.correct)bg='rgba(40,180,100,.55)'; else if(idx===picked)bg='rgba(220,70,60,.55)'; }
        return <button key={idx} onClick={()=>choose(o,idx)} style={{display:'block',width:'100%',textAlign:'left',margin:'8px 0',padding:'12px 14px',borderRadius:10,border:'1px solid rgba(255,255,255,.12)',background:bg,color:'#fff',cursor:picked!=null?'default':'pointer',fontSize:15}}>{o.t}</button>; })}

  </div></Modal>);
}

function WorkGame({job,onDone,onClose,startDelivery}){
  const a=job.archetype;
  if(a==='delivery') return (<Modal onClose={onClose}><div style={{padding:24,textAlign:'center'}}>
    <h2>{job.title} — Delivery</h2>
    <p style={{opacity:.8}}>A delivery point will appear on the map. Drive (press V) or walk to the glowing yellow marker to complete the shift.</p>
    <button className="btn gold" onClick={()=>{ startDelivery(); onClose(); }}>Drop marker & go</button>
  </div></Modal>);
  if(a==='clicker') return <ClickerGame job={job} onDone={onDone} onClose={onClose}/>;
  if(a==='timing') return <TimingGame job={job} onDone={onDone} onClose={onClose}/>;
  if(a==='memory') return <MemoryGame job={job} onDone={onDone} onClose={onClose}/>;
  if(a==='quiz') return <QuizWorkGame job={job} onDone={onDone} onClose={onClose}/>;

}
function ClickerGame({job,onDone,onClose}){
  const [score,setScore]=useState(0); const [time,setTime]=useState(8);
  useEffect(()=>{ if(time<=0){ onDone(0.4+Math.min(0.8,score/40)); return;} const t=setTimeout(()=>setTime(time-0.1),100); return ()=>clearTimeout(t); },[time]);
  return (<Modal onClose={onClose}><div style={{padding:24,textAlign:'center'}}>
    <h2>{job.title}</h2><p style={{opacity:.8}}>Serve as many customers as you can. Tap fast!</p>
    <div style={{fontSize:40,fontWeight:800,margin:'10px 0'}}>{score}</div>
    <button onClick={()=>{setScore(s=>s+1);SFX.click();}} style={{width:160,height:160,borderRadius:24,border:'none',background:'radial-gradient(circle at 35% 30%,#ffe082,#e6a417)',fontSize:22,fontWeight:800,color:'#5a3a00',cursor:'pointer',boxShadow:'0 8px 20px rgba(0,0,0,.4)'}}>SERVE</button>
    <div style={{marginTop:14}}><Bar label="Time" val={Math.ceil(time*10)/10} max={8} color="#4dd0e1"/></div>
  </div></Modal>);
}
function TimingGame({job,onDone,onClose}){
  const [pos,setPos]=useState(0); const [hits,setHits]=useState(0); const [tries,setTries]=useState(0); const [msg,setMsg]=useState("");
  const raf=useRef(); const st=useRef({p:0,d:1});
  useEffect(()=>{ const tick=()=>{ let{p,d}=st.current; p+=d*0.018; if(p>1){p=1;d=-1;} if(p<0){p=0;d=1;} st.current={p,d}; setPos(p); raf.current=requestAnimationFrame(tick); };
    raf.current=requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf.current); },[]);
  function hit(){ const inZone=st.current.p>0.42&&st.current.p<0.58; const nt=tries+1,nh=hits+(inZone?1:0);
    setMsg(inZone?"Perfect":"Missed"); inZone?SFX.good():SFX.bad(); setHits(nh); setTries(nt);
    if(nt>=5){ cancelAnimationFrame(raf.current); setTimeout(()=>onDone(0.3+nh/5*0.9),400); } }
  return (<Modal onClose={onClose}><div style={{padding:24,textAlign:'center'}}>
    <h2>{job.title}</h2><p style={{opacity:.8}}>Stop the marker in the green zone. 5 tries. ({hits}/{tries})</p>
    <div style={{position:'relative',height:30,background:'rgba(255,255,255,.1)',borderRadius:15,margin:'18px 0',overflow:'hidden'}}>
      <div style={{position:'absolute',left:'42%',width:'16%',height:'100%',background:'rgba(40,180,100,.5)'}}/>
      <div style={{position:'absolute',left:`calc(${pos*100}% - 4px)`,width:8,height:'100%',background:'#fff',borderRadius:4}}/></div>
    <div style={{height:20,color:'#ffd54f',fontWeight:600}}>{msg}</div>
    <button className="btn gold" onClick={hit} style={{marginTop:8,width:200}}>STOP</button>
  </div></Modal>);
}
function MemoryGame({job,onDone,onClose}){
  const colors=['#e0524a','#3f72af','#23b26d','#e6a417'];
  const [seq,setSeq]=useState([]); const [userIdx,setUserIdx]=useState(0); const [flash,setFlash]=useState(-1); const [phase,setPhase]=useState('show'); const [round,setRound]=useState(1);
  useEffect(()=>{ const ns=[...seq,rint(0,3)]; setSeq(ns); setPhase('show'); setUserIdx(0);
    let i=0; const iv=setInterval(()=>{ setFlash(ns[i]); beep(440+ns[i]*120,.12); setTimeout(()=>setFlash(-1),300); i++; if(i>=ns.length){ clearInterval(iv); setTimeout(()=>setPhase('input'),350);} },600);
    return ()=>clearInterval(iv); },[round]);
  function press(c){ if(phase!=='input') return; setFlash(c); beep(440+c*120,.1); setTimeout(()=>setFlash(-1),150);
    if(c!==seq[userIdx]){ SFX.bad(); setTimeout(()=>onDone(0.3+Math.min(0.9,(round-1)/5)),300); return; }
    const ni=userIdx+1; if(ni>=seq.length){ if(round>=5){ SFX.good(); setTimeout(()=>onDone(1.2),300);} else setTimeout(()=>setRound(r=>r+1),500); } setUserIdx(ni); }
  return (<Modal onClose={onClose}><div style={{padding:24,textAlign:'center'}}>
    <h2>{job.title}</h2><p style={{opacity:.8}}>{phase==='show'?'Watch the sequence...':'Now repeat it.'} (Round {round}/5)</p>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,maxWidth:260,margin:'16px auto'}}>
      {colors.map((c,i)=><button key={i} onClick={()=>press(i)} style={{height:90,borderRadius:14,border:'none',cursor:'pointer',background:c,opacity:flash===i?1:.45,transition:'opacity .12s'}}/>)}</div>
  </div></Modal>);
}
function QuizWorkGame({job,onDone,onClose}){
  const [qs]=useState(()=>shuffle(INTERVIEW_QUESTIONS).slice(0,4).map(q=>({q:q[0],opts:shuffle(q[1].map((t,i)=>({t,c:i===q[2]})))})));
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [picked,setPicked]=useState(null); const cur=qs[i];
  function choose(o,idx){ if(picked!=null)return; setPicked(idx); o.c?SFX.good():SFX.bad(); const ns=score+(o.c?1:0);
    setTimeout(()=>{ if(i+1>=qs.length) onDone(0.3+ns/qs.length*1.0); else {setScore(ns);setPicked(null);setI(i+1);} },500); }
  return (<Modal onClose={onClose}><div style={{padding:24}}>
    <h2 style={{textAlign:'center'}}>{job.title}</h2><p style={{opacity:.8,textAlign:'center'}}>Handle the situation correctly. ({i+1}/{qs.length})</p>
    <div style={{fontSize:16,fontWeight:600,margin:'10px 0'}}>{cur.q}</div>
    {cur.opts.map((o,idx)=>{ let bg='rgba(255,255,255,.08)'; if(picked!=null){ if(o.c)bg='rgba(40,180,100,.5)'; else if(idx===picked)bg='rgba(220,70,60,.5)';}
      return <button key={idx} onClick={()=>choose(o,idx)} style={{display:'block',width:'100%',textAlign:'left',margin:'7px 0',padding:'11px 13px',borderRadius:10,border:'1px solid rgba(255,255,255,.12)',background:bg,color:'#fff',cursor:'pointer'}}>{o.t}</button>; })}
  </div></Modal>);
}

function PhoneTapRace(){
  const [target,setTarget]=useState(null); const [score,setScore]=useState(0); const tref=useRef(null);
  function go(){ setScore(0); next(); }
  function next(){ tref.current=setTimeout(()=>setTarget({x:rint(5,80),y:rint(5,70)}),rint(300,1100)); }
  function hit(){ if(!target)return; setScore(s=>s+1); SFX.click(); setTarget(null); next(); }
  useEffect(()=>()=>clearTimeout(tref.current),[]);
  return <div style={{textAlign:'center'}}><h3 style={{marginTop:0}}>Tap Race</h3><div style={{opacity:.8,marginBottom:8}}>Tap the dots fast. Score: {score}</div>
    <div style={{position:'relative',height:200,background:'rgba(255,255,255,.06)',borderRadius:12,overflow:'hidden'}}>
      {target && <div onClick={hit} style={{position:'absolute',left:target.x+'%',top:target.y+'%',width:40,height:40,borderRadius:'50%',background:'#e0524a',cursor:'pointer'}}/>}
      {!target && <button className="btn" style={{position:'absolute',top:'42%',left:'34%'}} onClick={go}>Start</button>}</div></div>;
}
function PhoneMemory(){
  const tiles=['A','B','C','D','E','F','G','H'];
  const [cards,setCards]=useState(()=>shuffle([...tiles,...tiles].map((e,i)=>({i,e,flipped:false,done:false}))));
  const [sel,setSel]=useState([]);
  function flip(c){ if(c.flipped||c.done||sel.length>=2)return; const nc=cards.map(x=>x.i===c.i?{...x,flipped:true}:x); setCards(nc); const ns=[...sel,c]; setSel(ns); SFX.click();
    if(ns.length===2){ setTimeout(()=>{ if(ns[0].e===ns[1].e){ setCards(cs=>cs.map(x=>x.e===ns[0].e?{...x,done:true}:x)); SFX.good(); } else setCards(cs=>cs.map(x=>(x.i===ns[0].i||x.i===ns[1].i)?{...x,flipped:false}:x)); setSel([]); },700); } }
  const won=cards.every(c=>c.done);
  return <div style={{textAlign:'center'}}><h3 style={{marginTop:0}}>Memory Match</h3>{won&&<div style={{color:'#7ee0a0',marginBottom:8}}>You won!</div>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>{cards.map(c=><div key={c.i} onClick={()=>flip(c)} style={{aspectRatio:'1',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,cursor:'pointer',background:c.flipped||c.done?'rgba(255,255,255,.2)':'rgba(46,125,255,.5)'}}>{(c.flipped||c.done)?c.e:''}</div>)}</div></div>;
}

function App(){
  const [state,setState]=useState(loadState);
  const stateRef=useRef(state); stateRef.current=state;
  const [near,setNear]=useState(null);
  const [panel,setPanel]=useState(null);
  const [interviewJob,setInterviewJob]=useState(null);
  const [workJob,setWorkJob]=useState(null);
  const [toast,setToast]=useState("");
  const [levelUp,setLevelUp]=useState(null);
  const [showGift,setShowGift]=useState(false);
  const [driving,setDriving]=useState(false);
  const worldRef=useRef(null); const canvasRef=useRef(null);

  useEffect(()=>{
    document.getElementById('boot').style.display='none';
    const world=new World2D(canvasRef.current,{
      onNear:setNear, onVehicle:setDriving, onDeliveryDone:()=>finishWork(0.95,true) });
    worldRef.current=world;
    world.setTime(stateRef.current.timeOfDay);
    const vt=stateRef.current.vehicleType, v=(vt==='rv'?RVS[stateRef.current.currentRV]:CARS[stateRef.current.currentCar]);
    world.setVehicle(v.color,v.speed);
    if(stateRef.current.lastGiftDate!==todayStr()) setShowGift(true);
    return ()=>world.dispose();
  },[]);
  useEffect(()=>{ worldRef.current?.setEnabled(!(panel||interviewJob||workJob||levelUp||showGift)); },[panel,interviewJob,workJob,levelUp,showGift]);
  useEffect(()=>{ const iv=setInterval(()=>{ setState(s=>{ let t=s.timeOfDay+0.02; worldRef.current?.setTime(t);
    if(t>=24){ t-=24; return {...s,timeOfDay:t,day:s.day+1,shiftsToday:0,money:s.money+HOUSES[s.currentHouse].income}; } return {...s,timeOfDay:t}; }); },1000); return ()=>clearInterval(iv); },[]);
  useEffect(()=>{ localStorage.setItem(SAVE_KEY,JSON.stringify(state)); },[state]);

  function flash(m){ setToast(m); setTimeout(()=>setToast(""),2600); }
  function grantXP(amount){ setState(s=>{ let xp=s.xp+amount, level=s.level, leveled=null;
    while(xp>=xpForLevel(level+1)){ xp-=xpForLevel(level+1); level++; leveled=level; }
    if(leveled){ const reward=prizeForLevel(leveled); SFX.level(); setTimeout(()=>setLevelUp({level:leveled,reward}),300); return applyPrize({...s,xp,level},reward); }
    return {...s,xp,level}; }); }
  function prizeForLevel(lvl){ const p={3:{text:'Road Cruiser RV',kind:'rv',id:1},5:{text:'Sporty Coupe car',kind:'car',id:2},7:{text:'Modern Villa house',kind:'house',id:3},10:{text:money(5000)+' bonus',kind:'cash',amt:5000}};
    return p[lvl]||{text:money(lvl*200)+' bonus',kind:'cash',amt:lvl*200}; }
  function applyPrize(s,r){ if(!r)return s;
    if(r.kind==='cash') return {...s,money:s.money+r.amt};
    if(r.kind==='rv'&&!s.ownedRVs.includes(r.id)) return {...s,ownedRVs:[...s.ownedRVs,r.id]};
    if(r.kind==='car'&&!s.ownedCars.includes(r.id)) return {...s,ownedCars:[...s.ownedCars,r.id]};
    if(r.kind==='house'&&!s.ownedHouses.includes(r.id)) return {...s,ownedHouses:[...s.ownedHouses,r.id]};
    return s; }

  function applyJob(job){ setPanel(null); setInterviewJob(job); }
  function interviewResult(passed){ const job=interviewJob; setInterviewJob(null);
    if(passed){ setState(s=>({...s,jobId:job.id,stats:{...s.stats,interviewsPassed:s.stats.interviewsPassed+1}})); SFX.cash(); flash(`Hired as ${job.title}!`); grantXP(40); }
    else { flash(`Not hired for ${job.title}. Try again or pick another job.`); } }

    setWorkJob(null); const lvl=stateRef.current.level;

    setState(s=>({...s,money:s.money+pay,shiftsToday:s.shiftsToday+1,timeOfDay:Math.min(23.5,s.timeOfDay+3),stats:{...s.stats,shiftsWorked:s.stats.shiftsWorked+1,moneyEarned:s.stats.moneyEarned+pay}}));
    SFX.cash(); flash(`Shift done! +${money(pay)} · +${xp} XP`); grantXP(xp); }

  function buyItem(kind,item){ setState(s=>{ if(s.money<item.price)return s; const k={houses:'ownedHouses',rvs:'ownedRVs',cars:'ownedCars'}[kind];
    return {...s,money:s.money-item.price,[k]:[...s[k],item.id]}; }); SFX.cash(); flash(`Bought ${item.name}!`); equipItem(kind,item.id); }
  function equipItem(kind,id){ const ck={houses:'currentHouse',rvs:'currentRV',cars:'currentCar'}[kind];
    setState(s=>{ const ns={...s,[ck]:id}; if(kind==='cars')ns.vehicleType='car'; if(kind==='rvs')ns.vehicleType='rv'; return ns; });
    if(kind==='cars'){ const c=CARS[id]; worldRef.current?.setVehicle(c.color,c.speed); }

  function buyStoreItem(s){ if(state.money<s.price)return; setState(p=>({...p,money:p.money-s.price,inventory:[...p.inventory,s.id]})); SFX.cash(); flash(`Bought ${s.itemName}! +${s.xp} XP`); grantXP(s.xp); }
  function claimGift(r){ setState(s=>r.apply({...s,lastGiftDate:todayStr()})); if(r.xp) grantXP(80); setShowGift(false); SFX.cash(); flash(`Claimed ${r.text}!`); }

    </div>

    {/* interaction prompt */}
    {near && !blocking && <div style={{position:'fixed',bottom:90,left:'50%',transform:'translateX(-50%)',background:'rgba(12,18,34,.92)',borderRadius:12,padding:'10px 18px',border:'1px solid rgba(255,255,255,.15)',fontSize:15,zIndex:16}}>
      <button className="btn gold" style={{marginRight:8}} onClick={()=>openBuilding(near)}>Enter</button>{BNAMES[near]} <span style={{opacity:.6,fontSize:12}}>(or press E)</span></div>}

    {!blocking && <button className="btn green" style={{position:'fixed',bottom:84,right:16,zIndex:15}} onClick={()=>worldRef.current?.toggleVehicle()}>{driving?'Walk':'Drive'}</button>}
    {!blocking && <DPad world={worldRef}/>}

    <Toast msg={toast}/>

    {panel==='jobs' && <JobCenter state={state} onApply={applyJob} onWork={startWork} onClose={()=>setPanel(null)}/>}
    {panel==='mall' && <Mall state={state} onBuy={buyStoreItem} onClose={()=>setPanel(null)}/>}
    {panel==='houses' && <Shop kind="houses" state={state} onBuy={buyItem} onEquip={equipItem} onClose={()=>setPanel(null)}/>}
    {panel==='rvs' && <Shop kind="rvs" state={state} onBuy={buyItem} onEquip={equipItem} onClose={()=>setPanel(null)}/>}
    {panel==='cars' && <Shop kind="cars" state={state} onBuy={buyItem} onEquip={equipItem} onClose={()=>setPanel(null)}/>}
    {panel==='phone' && <Phone state={state} setState={setState} onClose={()=>setPanel(null)} onTeleport={(id)=>worldRef.current?.teleportTo(id)}/>}

    {interviewJob && <Interview job={interviewJob} onResult={interviewResult} onClose={()=>setInterviewJob(null)}/>}
    {workJob && <WorkGame job={workJob} onDone={(p)=>finishWork(p,false)} onClose={()=>setWorkJob(null)} startDelivery={()=>{ worldRef.current?.startDelivery(); flash('Drive or walk to the yellow marker on the map.'); }}/>}
    {levelUp && <LevelUp level={levelUp.level} reward={levelUp.reward} onClose={()=>setLevelUp(null)}/>}
    {showGift && <DailyGift day={state.day} onClaim={claimGift} onClose={()=>{ setState(s=>({...s,lastGiftDate:todayStr()})); setShowGift(false); }}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
